<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TikTok Shop Orders</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #111;
  color: white;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header a {
  color: #4da3ff;
  text-decoration: none;
  font-size: 14px;
}

header a:hover {
  text-decoration: underline;
}

.controls {
  background: #fff;
  padding: 10px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.copy { background:#2d6cdf; color:white; }
.clear { background:#e74c3c; color:white; }

textarea {
  width: 100%;
  height: calc(100vh - 110px);
  border: none;
  padding: 15px;
  font-size: 14px;
  outline: none;
  resize: none;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  opacity: 0;
  transition: 0.3s;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>

<header>
  <div>TikTok Shop Orders</div>
  <a href="https://luxotticagroup.sharepoint.com/:x:/s/O365-NACCGameofForms/IQDGXJVNgbFYSKJNwUCJitnxAX0FT7kTwbqhdkVGcmXabrk?wdExp=TEAMS-TREATMENT&web=1&TeamsCID=6b214ac7-0f00-42d7-8862-21050ea3b68e&isSPOFile=1&ovuser=c7d1a8f7-0546-4a0c-8cf5-3ddaebf97d51%2CBBarliso.ext%40luxotticaretail.com&clickparams=eyJBcHBOYW1lIjoiVGVhbXMtRGVza3RvcCIsIkFwcFZlcnNpb24iOiI0OS8yNjA1MTQxNjcxNSIsIkhhc0ZlZGVyYXRlZFVzZXIiOmZhbHNlfQ%3D%3D&linkOpenTime=1781589681936"
     target="_blank">
    Open Excel Sheet
  </a>
</header>

<div class="controls">
  <button class="copy" onclick="copyText()">Copy</button>
  <button class="clear" onclick="clearText()">Clear</button>
</div>

<textarea id="note" placeholder="Enter today's orders..."></textarea>

<div id="toast" class="toast">Copied to clipboard</div>

<script>

function getDateKey() {
  return new Date().toLocaleDateString("en-CA", {
    timeZone: "America/New_York"
  });
}

document.title = "TikTok Shop Orders";

const note = document.getElementById("note");
const toast = document.getElementById("toast");

const key = getDateKey();

// load saved note
note.value = localStorage.getItem(key) || "";

// autosave
note.addEventListener("input", () => {
  localStorage.setItem(key, note.value);
});

// copy
function copyText() {
  navigator.clipboard.writeText(note.value);
  showToast("Copied to clipboard");
}

// clear
function clearText() {
  if (confirm("Clear today's notes?")) {
    note.value = "";
    localStorage.removeItem(key);
  }
}

// toast
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}

</script>

</body>
</html>
