<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Shop Orders</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

body {
    display: flex;
    flex-direction: column;
}

header {
    background: #111;
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    box-sizing: border-box;
    flex-shrink: 0;
}

.title-section {
    display: flex;
    flex-direction: column;
}

.title {
    font-size: 18px;
    font-weight: bold;
}

.date {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 2px;
}

header a {
    color: #4da3ff;
    text-decoration: none;
    font-size: 14px;
    white-space: nowrap;
}

header a:hover {
    text-decoration: underline;
}

.controls {
    background: #fff;
    padding: 10px;
    display: flex;
    gap: 10px;
    border-bottom: 1px solid #ddd;
    box-sizing: border-box;
    flex-shrink: 0;
}

button {
    padding: 8px 14px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
}

.copy {
    background: #2d6cdf;
    color: white;
}

.clear {
    background: #e74c3c;
    color: white;
}

button:hover {
    opacity: 0.9;
}

textarea {
    flex: 1;
    width: 100%;
    min-height: 0;
    border: none;
    outline: none;
    resize: none;
    padding: 15px;
    box-sizing: border-box;
    font-size: 14px;
    font-family: inherit;
    overflow: auto;
    background: white;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 9999;
}

.toast.show {
    opacity: 1;
}

@media (max-width: 600px) {
    header {
        flex-direction: column;
        align-items: flex-start;
    }

    .controls {
        flex-wrap: wrap;
    }
}
</style>
</head>

<body>

<header>
    <div class="title-section">
        <div class="title">TikTok Shop Orders</div>
        <div class="date" id="dateDisplay"></div>
    </div>

    <a href="https://luxotticagroup.sharepoint.com/:x:/s/O365-NACCGameofForms/IQDGXJVNgbFYSKJNwUCJitnxAX0FT7kTwbqhdkVGcmXabrk?wdExp=TEAMS-TREATMENT&web=1&TeamsCID=6b214ac7-0f00-42d7-8862-21050ea3b68e&isSPOFile=1&ovuser=c7d1a8f7-0546-4a0c-8cf5-3ddaebf97d51%2CBBarliso.ext%40luxotticaretail.com&clickparams=eyJBcHBOYW1lIjoiVGVhbXMtRGVza3RvcCIsIkFwcFZlcnNpb24iOiI0OS8yNjA1MTQxNjcxNSIsIkhhc0ZlZGVyYXRlZFVzZXIiOmZhbHNlfQ%3D%3D&linkOpenTime=1781589681936"
       target="_blank"
       rel="noopener noreferrer">
        Open Excel Sheet
    </a>
</header>

<div class="controls">
    <button class="copy" onclick="copyText()">Copy</button>
    <button class="clear" onclick="clearText()">Clear</button>
</div>

<textarea id="note" placeholder="Enter today's TikTok Shop orders here..."></textarea>

<div id="toast" class="toast"></div>

<script>
function getEasternDateDisplay() {
    return new Date().toLocaleDateString("en-US", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "long",
        day: "2-digit"
    });
}

function getStorageKey() {
    const dateKey = new Date().toLocaleDateString("en-CA", {
        timeZone: "America/New_York"
    });

    return "tiktok_orders_" + dateKey;
}

const note = document.getElementById("note");
const toast = document.getElementById("toast");

document.getElementById("dateDisplay").textContent = getEasternDateDisplay();

const storageKey = getStorageKey();

// Load today's notes
note.value = localStorage.getItem(storageKey) || "";

// Auto-save
note.addEventListener("input", () => {
    localStorage.setItem(storageKey, note.value);
});

// Copy notes
async function copyText() {
    try {
        await navigator.clipboard.writeText(note.value);
        showToast("✓ Copied to clipboard");
    } catch (err) {
        showToast("Unable to copy");
    }
}

// Clear notes
function clearText() {
    const confirmed = confirm("Are you sure you want to clear today's notes?");

    if (confirmed) {
        note.value = "";
        localStorage.removeItem(storageKey);
        showToast("Today's notes cleared");
    }
}

// Toast notification
function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");

    clearTimeout(window.toastTimer);

    window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
    }, 1800);
}
</script>

</body>
</html>
